<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANETOR</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Miranda+Sans:ital,wght@0,400..700;1,400..700&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="top">
            <div class="left">
                <div class="m"><h1>M</h1></div>
                <div class="manetor"><h1> Manetor</h1></div>
            </div>
            <div class="media">
                <div><h1>Media Library</h1></div>
                <div class="jd"><span>JD</span></div>
            </div>
        </div>
    </header>

    <section class="content">

        <div class="sidebar">
          <div class="left-menu">

          <a href="#" class="menu-item">
          <i class="fa-solid fa-house icon"></i>
          <span>Dashboard</span>
         </a>

         <a href="#" class="menu-item active">
         <i class="fa-regular fa-image icon"></i>
         <span >Media Library</span>
         </a>

         <a href="#" class="menu-item">
         <i class="fa-regular fa-circle-user icon"></i>
         <span>Contacts</span>
         </a>

         <a href="#" class="menu-item">
         <i class="fa-solid fa-chart-column icon"></i>
         <span>Analytics</span>
         </a>

         <a href="#" class="menu-item">
         <i class="fa-regular fa-folder icon"></i>
         <span>Documents</span>
         </a>

  </div>

  <!-- Settings outside the left-menu -->
  <a href="#" class="menu-item settings-item">
    <i class="fa-solid fa-gear icon"></i>
    <span>Settings</span>
  </a>
</div>
        
    <!-- right side scrolling content for the images-->

    
        <div class="content-right">
            <div class="storage">
                <div class="head">
                    <div><h2>Storage Usage</h2>
                    <p>Monitor your storage consumption</p></div>
                    <div class="over-limit"><h3> ⚠ Over Limit </h3></div>
                </div>

                <div class="storage-container">
                    <div class="storage-text">
                      <span><strong>1.8 GB</strong> </span>
                      <span class="free"> used of <b style="color: rgb(0, 0, 0);">1 GB</b> free</span>
                    </div>

                    <progress value="1.8" max="2.1" class="storage-progress"></progress>
                </div>

                <div class="extra-storage">
                     <h4> ⚠ Extra Storage Usage </h4>
                    <p>0.8 GB extra -> <b> $4.00</b> additional charge </p>
                </div>

                <div class="upgrade-button"><a href="#">Upgrade Storage</a></div>
            </div>

            <!-- media files -->

            <div class="media-files">
                <div class="options">
                    <div><h3>Media Files</h3></div>
                    <div class="options-right">
                        <div><input type="search" name="" id="" placeholder="search media..." class=""></div>
                        <div><input type="text" name="" id=""placeholder="fff"></div>
                        <div><input type="button" value="Upload Media"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
